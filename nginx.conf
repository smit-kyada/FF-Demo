server {
    listen 80;
    server_name game.gamespowerplay.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name game.gamespowerplay.com;

    # -----------------------------------------------
    # SSL CERTIFICATES
    # Run: certbot --nginx -d game.gamespowerplay.com
    # -----------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/game.gamespowerplay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.gamespowerplay.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -----------------------------------------------
    # LOGGING
    # -----------------------------------------------
    access_log /var/log/nginx/game.gamespowerplay.com-access.log;
    error_log  /var/log/nginx/game.gamespowerplay.com-error.log;

    # -----------------------------------------------
    # GZIP
    # -----------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # -----------------------------------------------
    # SECURITY HEADERS
    # -----------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # -----------------------------------------------
    # PROXY TO NODE.JS (port 3000)
    # All requests go to your Express server,
    # which then routes everything through the proxy.
    # -----------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # -----------------------------------------------
    # STATIC FILES — served directly by nginx
    # -----------------------------------------------
    location ~* \.(ico|png|webp|jpg|jpeg|gif|svg|woff2|woff|ttf)$ {
        root  /var/www/game/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------
    # BLOCK common attack paths
    # -----------------------------------------------
    location ~ /\.ht       { deny all; }
    location ~ /\.git      { deny all; }
    location ~ /\.env      { deny all; }
}
